<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户登录</title>
    <link rel="stylesheet" href="/static/css/bootstrap.css">
    <style>
        * {
            padding: 0;
            margin: 0;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #1e293b 0%, #334155 50%, #475569 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
        }

        .shell {
            width: 380px;
            padding: 45px 40px 35px;
            display: flex;
            align-items: center;
            flex-direction: column;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 30px;
            color: #f1f5f9;
            letter-spacing: 2px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            height: 48px;
            margin: 8px 0;
            box-sizing: border-box;
            color: #e2e8f0;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.06);
            border-radius: 10px;
            padding: 0 16px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s, background 0.2s;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: #60a5fa;
            background: rgba(255, 255, 255, 0.1);
        }

        input[type="text"]::placeholder,
        input[type="password"]::placeholder {
            color: #94a3b8;
        }

        input[type="submit"] {
            width: 100%;
            height: 48px;
            padding: 0;
            margin: 16px 0 8px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: #fff;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 2px;
            transition: opacity 0.2s;
        }

        input[type="submit"]:hover {
            opacity: 0.9;
        }

        input[type="submit"]:active {
            transform: scale(0.98);
        }

        .error-msg {
            color: #f87171;
            font-size: 14px;
            margin-top: 4px;
            display: block;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="shell">
        <h2 class="title">Login</h2>
        <form method="post" action="/login" style="width:100%;">
            <input type="text" id="user" name="user" placeholder="用户名">
            <input type="password" id="pwd" name="pwd" placeholder="密码">
            <input type="submit" value="登 录" id="loginBtn">
            {% if error %}
            <span class="error-msg">{{ error }}</span>
            {% endif %}
        </form>
    </div>
    <script src="/static/jquery-4.0.0.min.js"></script>
    <script src="/static/js/bootstrap.js"></script>
</body>
</html>
