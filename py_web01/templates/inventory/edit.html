{% extends "base.html" %}

{% block title %}编辑商品{% endblock %}

{% block content %}
<div class="container" style="margin-top:30px;">
    <h2>编辑商品 #{{ item.id }} <a href="/inventory/list" class="btn btn-default pull-right">返回列表</a></h2>
    <form method="post" action="/inventory/edit/{{ item.id }}" style="max-width:500px;margin-top:30px;">
        <div class="form-group">
            <label>商品</label>
            <input type="text" name="product" class="form-control" value="{{ item.product }}" required>
        </div>
        <div class="form-group">
            <label>市场价</label>
            <input type="number" step="0.01" name="price" class="form-control" value="{{ item.price }}" required>
        </div>
        <div class="form-group">
            <label>总数量</label>
            <input type="number" name="total_qty" class="form-control" value="{{ item.total_qty }}" required>
        </div>
        <div class="form-group">
            <label>出库数量</label>
            <input type="number" name="outbound_qty" class="form-control" value="{{ item.outbound_qty }}" required>
        </div>
        <div class="form-group">
            <label>剩余数量</label>
            <input type="number" name="remaining_qty" class="form-control" value="{{ item.remaining_qty }}" readonly style="background:#f5f5f5;">
        </div>
        <button type="submit" class="btn btn-primary">保存修改</button>
    </form>
</div>
{% endblock %}
