{% extends "base.html" %}

{% block title %}添加商品{% endblock %}

{% block content %}
<div style="margin-top:30px;">
    <h2>添加商品 <a href="/inventory/list" class="btn btn-default pull-right">返回列表</a></h2>
    <form method="post" action="/inventory/create" style="max-width:500px;margin-top:30px;">
        <div class="form-group">
            <label>商品</label>
            <input type="text" name="product" class="form-control" required>
        </div>
        <div class="form-group">
            <label>市场价</label>
            <input type="number" step="0.01" name="price" class="form-control" required>
        </div>
        <div class="form-group">
            <label>总数量</label>
            <input type="number" name="total_qty" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary">提交</button>
    </form>
</div>
{% endblock %}
