{% extends "base.html" %}

{% block title %}新建订单{% endblock %}

{% block content %}
<div class="container" style="margin-top:30px;">
    <h2>新建订单 <a href="/main/list" class="btn btn-default pull-right">返回列表</a></h2>
    <form method="post" action="/main/create" style="max-width:500px;margin-top:30px;">
        <div class="form-group">
            <label>提单人</label>
            <input type="text" name="customer" class="form-control" value="{{ session.get('user_name', '') }}" readonly style="background:#f5f5f5;color:#666;">
        </div>
        <div class="form-group">
            <label>商品名称</label>
            <select name="product" class="form-control" required>
                <option value="">请选择商品</option>
                {% for p in products %}
                <option value="{{ p.product }}" data-price="{{ p.price }}">{{ p.product }}（¥{{ "{:.2f}".format(p.price) }}）</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>市场售价</label>
            <input type="number" step="0.01" name="market_price" id="marketPrice" class="form-control" readonly style="background:#f5f5f5;" required>
        </div>
        <div class="form-group">
            <label>优惠售价</label>
            <input type="number" step="0.01" name="discount_price" id="discountPrice" class="form-control" readonly style="background:#f5f5f5;" required>
        </div>
        <div class="form-group">
            <label>状态</label>
            <input type="text" class="form-control" value="待处理" readonly style="background:#f5f5f5;color:#666;">
        </div>
        <button type="submit" class="btn btn-primary">提交订单</button>
    </form>
</div>

<script>
    document.querySelector('select[name="product"]').addEventListener('change', function() {
        var marketInput = document.getElementById('marketPrice');
        var discountInput = document.getElementById('discountPrice');
        var selected = this.options[this.selectedIndex];
        var price = selected.getAttribute('data-price');
        var val = price ? parseFloat(price).toFixed(2) : '';
        marketInput.value = val;
        discountInput.value = val;
    });
</script>
{% endblock %}
