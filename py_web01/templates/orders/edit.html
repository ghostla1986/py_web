{% extends "base.html" %}

{% block title %}编辑订单{% endblock %}

{% block content %}
<div class="container" style="margin-top:30px;">
    <h2>编辑订单 #{{ order.id }} <a href="/main/list" class="btn btn-default pull-right">返回列表</a></h2>
    <form method="post" action="/main/edit/{{ order.id }}" style="max-width:500px;margin-top:30px;">
        <div class="form-group">
            <label>客户名称</label>
            <input type="text" name="customer" class="form-control" value="{{ order.customer }}" required>
        </div>
        <div class="form-group">
            <label>商品名称</label>
            <input type="text" name="product" class="form-control" value="{{ order.product }}" required>
        </div>
        {% if is_regular %}
        <div class="form-group">
            <label>金额</label>
            <input type="text" class="form-control" value="¥{{ "{:,.2f}".format(order.amount) }}" readonly>
            <input type="hidden" name="amount" value="{{ order.amount }}">
        </div>
        <div class="form-group">
            <label>状态</label>
            <input type="text" class="form-control" value="{{ order.status }}" readonly>
            <input type="hidden" name="status" value="{{ order.status }}">
        </div>
        {% else %}
        <div class="form-group">
            <label>金额</label>
            <input type="number" step="0.01" name="amount" class="form-control" value="{{ order.amount }}" required>
        </div>
        <div class="form-group">
            <label>状态</label>
            <select name="status" class="form-control">
                <option value="待处理" {% if order.status == '待处理' %}selected{% endif %}>待处理</option>
                <option value="待发货" {% if order.status == '待发货' %}selected{% endif %}>待发货</option>
                <option value="已配送" {% if order.status == '已配送' %}selected{% endif %}>已配送</option>
                <option value="已送达" {% if order.status == '已送达' %}selected{% endif %}>已送达</option>
            </select>
        </div>
        {% endif %}
        <button type="submit" class="btn btn-primary">保存修改</button>
    </form>
</div>
{% endblock %}
